name: Movie API Monitor

on:
  schedule:
    - cron: '0 * * * *' # Runs exactly every hour
  workflow_dispatch:

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run API Seat Tracker
        run: python bot.py

      - name: Commit and Push Data
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          
          # Only proceed if the CSV file exists
          if [ -f seat_tracking.csv ]; then
            git add seat_tracking.csv
            # '|| true' ensures the workflow doesn't fail if there are no new bookings to commit
            git commit -m "API Update: $(date)" || true
            git push
          else
            echo "Error: seat_tracking.csv not found. Check bot.py logs for API failures."
            exit 1
          fi
