name: Movie Seat Monitor

on:
  schedule:
    - cron: '0 * * * *' # Runs exactly every hour
  workflow_dispatch: # Allows you to trigger it manually for testing

jobs:
  scrape-and-log:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Playwright and Browser
        run: |
          pip install playwright
          # This installs the Chromium browser and the system-level libraries it needs
          python -m playwright install chromium --with-deps

      - name: Run Seat Tracker
        run: python bot.py

      - name: Commit and Push Data
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          
          if [ -f seat_tracking.csv ]; then
            git add seat_tracking.csv
            # '|| true' ensures the workflow doesn't fail if the seat count hasn't changed
            git commit -m "Update seat counts: $(date)" || true
            git push
          else
            echo "CSV file missing. Check bot logs for errors."
            exit 1
          fi
