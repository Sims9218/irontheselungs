name: Movie API Monitor

on:
  schedule:
    - cron: '0 * * * *' 
  workflow_dispatch:

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run API Seat Tracker
        run: python bot.py

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Bot"
          git config --global user.email "bot@github.com"
          if [ -f seat_tracking.csv ]; then
            git add seat_tracking.csv
            git commit -m "Seat update: $(date)" || true
            git push
          fi
