name: Movie Seat Monitor

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  workflow_dispatch: # Allows manual trigger for testing

jobs:
  scrape-and-log:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Playwright and Browser
        run: |
          pip install playwright
          python -m playwright install chromium --with-deps

      - name: Run Seat Tracker
        run: python bot.py

      - name: Upload Error Screenshot if Failed
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshot
          path: error_screenshot.png
          retention-days: 1

      - name: Commit and Push Data
        if: always() # Try to push even if the bot log shows 0 seats, as long as CSV exists
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          
          if [ -f seat_tracking.csv ]; then
            git add seat_tracking.csv
            git commit -m "Update seat counts: $(date)" || true
            git push
          else
            echo "CSV file not found. Script likely crashed before saving."
            exit 1
          fi
